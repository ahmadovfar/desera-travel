<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desera Travel — Global DMC Partner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--c1:#E8604C;--c1h:#D4513F;--c1l:#FEF0EE;--c2:#1B6B4A;--c2l:#EDF7F2;--c3:#2563EB;--c3l:#EFF6FF;--gd:#D4A843;--gdl:#FDF8EC;--dk:#1A1A1A;--g50:#FAFAF8;--g100:#F3F2EE;--g200:#E5E3DC;--g300:#C8C5BA;--g500:#8A8680;--g700:#4A4844;--fd:'DM Serif Display',Georgia,serif;--fb:'Plus Jakarta Sans',-apple-system,sans-serif;--mx:1320px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:var(--fb);color:var(--g700);background:var(--g50);overflow-x:hidden}a{text-decoration:none;color:inherit}img{max-width:100%;display:block}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(250,250,248,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--g200)}
nav.dk{background:rgba(26,26,26,.88);border-color:rgba(255,255,255,.08)}nav.dk .logo,nav.dk .nl a{color:#fff}nav.dk .nav-cta{background:#fff;color:var(--dk)}
nav.dk .dd{background:rgba(30,30,30,.96);border-color:rgba(255,255,255,.1)}nav.dk .dd a{color:rgba(255,255,255,.7)}nav.dk .dd a:hover{color:var(--c1);background:rgba(255,255,255,.05)}
.ni{max-width:var(--mx);margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:72px}
.logo{font-family:var(--fd);font-size:26px;color:var(--dk);cursor:pointer}.logo span{color:var(--c1)}
.nl{display:flex;align-items:center;gap:24px}
.nl a,.nl>div>span{color:var(--g700);font-size:14px;font-weight:500;cursor:pointer}.nl a:hover,.nl>div>span:hover{color:var(--c1)}
.dd-wrap{position:relative;padding-bottom:14px;margin-bottom:-14px}
.dd{display:none;position:absolute;top:100%;left:-20px;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);border:1px solid var(--g200);border-radius:16px;padding:16px 12px 12px;min-width:280px;box-shadow:0 16px 48px rgba(0,0,0,.1);z-index:99}
.dd-wrap:hover .dd{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.dd a{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:14px;color:var(--g700);cursor:pointer;white-space:nowrap}.dd a:hover{background:var(--g100);color:var(--c1)}.dd a .fl{font-size:18px}
.nav-cta{padding:11px 28px;background:var(--c1);color:#fff;border:none;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.nav-cta:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,96,76,.3)}
@media(max-width:900px){.nl{display:none}}
.sec{padding:100px 0}.con{max-width:var(--mx);margin:0 auto;padding:0 40px}
.sh{text-align:center;max-width:680px;margin:0 auto 64px}
.stag{display:inline-block;font-size:13px;font-weight:700;color:var(--c1);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.stitle{font-family:var(--fd);font-size:clamp(32px,4vw,48px);font-weight:400;line-height:1.15;color:var(--dk);margin-bottom:16px}
.sdesc{font-size:17px;line-height:1.7;color:var(--g500);font-weight:300}
.bp{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;background:var(--c1);color:#fff;border:none;border-radius:100px;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--fb)}.bp:hover{background:var(--c1h);transform:translateY(-2px);box-shadow:0 8px 30px rgba(232,96,76,.35)}
.hero{min-height:100vh;position:relative;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 2s ease}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(15,20,30,.88) 0%,rgba(15,20,30,.75) 35%,rgba(15,20,30,.3) 65%,rgba(15,20,30,.15) 100%)}
.hero h1{font-family:var(--fd);font-size:clamp(42px,5.5vw,72px);font-weight:400;line-height:1.1;color:#fff;margin-bottom:24px;max-width:600px}
.hero h1 em{font-style:italic;color:var(--gd)}
.hero-sub{font-size:18px;line-height:1.7;color:rgba(255,255,255,.7);max-width:480px;margin-bottom:40px;font-weight:300}
.hero-c{position:relative;z-index:2;max-width:var(--mx);width:100%;margin:0 auto;padding:160px 40px 100px}
.hero-dots{display:flex;gap:10px;margin-top:48px}
.hero-dot{width:48px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s}
.hero-dot.active{background:var(--c1);width:64px}
@media(max-width:768px){.hero-c{padding:120px 24px 80px}}
.hero-c{position:relative;z-index:2;max-width:var(--mx);width:100%;margin:0 auto;padding:140px 40px 100px}
.hero h1{font-family:var(--fd);font-size:clamp(42px,5.5vw,72px);font-weight:400;line-height:1.1;color:#fff;margin-bottom:24px;max-width:700px}
.hero h1 em{font-style:italic;color:var(--gd)}
.hero-sub{font-size:18px;line-height:1.7;color:rgba(255,255,255,.8);max-width:520px;margin-bottom:40px;font-weight:300}
.hero-act{display:flex;gap:16px;flex-wrap:wrap}
.bs{display:inline-flex;align-items:center;gap:8px;padding:16px 32px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:100px;font-size:16px;font-weight:500;cursor:pointer;font-family:var(--fb)}.bs:hover{background:rgba(255,255,255,.2)}
.trust{background:#fff;border-bottom:1px solid var(--g200);padding:20px 0}
.trust-i{max-width:var(--mx);margin:0 auto;padding:0 40px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px}
.ti{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--g700);font-weight:500}
.ti-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.pc{padding:36px 28px;background:#fff;border:1px solid var(--g200);border-radius:20px;transition:all .4s}.pc:hover{border-color:var(--c1);transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.06)}
.pc-ic{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px}
.pt{font-family:var(--fd);font-size:20px;color:var(--dk);margin-bottom:10px}
.pp{font-size:14px;line-height:1.7;color:var(--g500);font-weight:300}
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.dc{position:relative;border-radius:20px;overflow:hidden;cursor:pointer;transition:all .4s;aspect-ratio:3/4;background-size:cover;background-position:center}
.dc:nth-child(1){grid-column:span 2;grid-row:span 2;aspect-ratio:auto}
.dc-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.65),transparent 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:24px}
.dc:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.15)}
.dc-fl{font-size:28px;margin-bottom:6px}.dc-n{font-family:var(--fd);font-size:22px;color:#fff}.dc-s{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.sv{border-radius:20px;overflow:hidden;background:#fff;border:1px solid var(--g200);transition:all .4s}.sv:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.06)}
.sv-img{height:200px;overflow:hidden}.sv-img img{width:100%;height:100%;object-fit:cover}
.sv-b{padding:28px}.sv-t{font-family:var(--fd);font-size:20px;color:var(--dk);margin-bottom:10px}.sv-p{font-size:14px;line-height:1.7;color:var(--g500);font-weight:300}
.d-hero{height:80vh;min-height:500px;position:relative;display:flex;align-items:flex-end;overflow:hidden}
.d-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}.d-hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.7),rgba(0,0,0,.15) 50%);z-index:1}
.d-hero-c{position:relative;z-index:2;max-width:var(--mx);width:100%;margin:0 auto;padding:0 40px 60px}
.d-hero-c h1{font-family:var(--fd);font-size:clamp(40px,6vw,64px);color:#fff;margin-bottom:12px}
.d-hero-c>p{font-size:20px;color:rgba(255,255,255,.7);font-weight:300}
.live{background:#fff;border-bottom:1px solid var(--g200);padding:16px 0}
.live-i{max-width:var(--mx);margin:0 auto;padding:0 40px;display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.live-item{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:var(--g700)}.live-item .val{font-weight:700;color:var(--dk);font-size:16px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.d-about{padding:80px 0}.d-about .con{display:grid;grid-template-columns:1.2fr 1fr;gap:60px;align-items:center}
.d-about-txt h2{font-family:var(--fd);font-size:clamp(28px,3.5vw,38px);color:var(--dk);margin-bottom:20px}
.d-about-txt p{font-size:16px;line-height:1.8;color:var(--g500);font-weight:300;margin-bottom:20px}
.d-about-img{border-radius:24px;overflow:hidden;aspect-ratio:4/3}.d-about-img img{width:100%;height:100%;object-fit:cover}
.cities-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:48px}
.city-card{border-radius:20px;overflow:hidden;position:relative;aspect-ratio:3/4}.city-card img{width:100%;height:100%;object-fit:cover}
.city-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.6),transparent 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
.city-n{font-family:var(--fd);font-size:20px;color:#fff}.city-s{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
.prod{background:#fff;border:1px solid var(--g200);border-radius:20px;padding:32px;text-align:center;transition:all .4s}.prod:hover{border-color:var(--c1);transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.06)}
.prod-ic{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
.prod-t{font-family:var(--fd);font-size:20px;color:var(--dk);margin-bottom:8px}.prod-p{font-size:14px;line-height:1.6;color:var(--g500);font-weight:300}
.tour-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
.tour{border-radius:20px;overflow:hidden;background:#fff;border:1px solid var(--g200);transition:all .4s}.tour:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.06)}
.tour-img{height:220px;overflow:hidden;position:relative}.tour-img img{width:100%;height:100%;object-fit:cover}
.tour-dur{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:100px}
.tour-b{padding:24px}.tour-t{font-family:var(--fd);font-size:18px;color:var(--dk);margin-bottom:8px}.tour-p{font-size:14px;line-height:1.6;color:var(--g500);font-weight:300}
.photo-strip{display:flex;gap:12px;overflow-x:auto;padding:0 40px 20px;scroll-snap-type:x mandatory}.photo-strip img{height:280px;border-radius:16px;scroll-snap-align:start;flex-shrink:0;object-fit:cover}
.usp{background:linear-gradient(135deg,var(--dk),#1f2937);padding:80px 0;position:relative;overflow:hidden}
.usp-c{position:relative;z-index:2;max-width:var(--mx);margin:0 auto;padding:0 40px}
.usp-h{text-align:center;margin-bottom:48px}.usp-h h2{font-family:var(--fd);font-size:clamp(28px,3.5vw,38px);color:#fff;margin-bottom:12px}.usp-h p{font-size:17px;color:rgba(255,255,255,.5);font-weight:300}
.usp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.usp-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px}
.usp-num{font-family:var(--fd);font-size:36px;color:var(--c1);margin-bottom:8px}.usp-t{font-size:16px;font-weight:600;color:#fff;margin-bottom:8px}.usp-p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;font-weight:300}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:48px}
.info-card{background:#fff;border:1px solid var(--g200);border-radius:16px;padding:24px;text-align:center}
.info-ic{font-size:28px;margin-bottom:12px}.info-t{font-size:13px;font-weight:700;color:var(--dk);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.info-v{font-size:15px;color:var(--g500);line-height:1.5}
.form-box{max-width:720px;margin:0 auto;padding:48px;background:#fff;border:1px solid var(--g200);border-radius:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.form-field{display:flex;flex-direction:column;gap:6px}.form-field.full{grid-column:span 2}
.form-field label{font-size:13px;font-weight:600;color:var(--dk);text-transform:uppercase;letter-spacing:.3px}
.form-field input,.form-field select,.form-field textarea{padding:14px 18px;border:1px solid var(--g200);border-radius:12px;font-size:15px;font-family:var(--fb);color:var(--dk);background:#fff;outline:none}.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--c1)}
.form-field textarea{resize:vertical;min-height:80px}
.checks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0 20px}
.check-item{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--g700)}.check-item input{accent-color:var(--c1);width:16px;height:16px}
footer{background:#fff;border-top:1px solid var(--g200);padding:64px 0 32px}
.ft{max-width:var(--mx);margin:0 auto;padding:0 40px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
.ft-b .logo{margin-bottom:16px;display:block}.ft-b p{font-size:14px;color:var(--g500);line-height:1.7;max-width:300px;font-weight:300}
.ft-c h4{font-size:13px;font-weight:700;color:var(--dk);letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px}
.ft-c a{display:block;font-size:14px;color:var(--g500);margin-bottom:10px;cursor:pointer}.ft-c a:hover{color:var(--c1)}
.fbar{max-width:var(--mx);margin:0 auto;padding:20px 40px 0;border-top:1px solid var(--g200);display:flex;justify-content:space-between;font-size:13px;color:var(--g300)}
@media(max-width:1024px){.pgrid,.cities-grid,.info-grid{grid-template-columns:repeat(2,1fr)}.dgrid{grid-template-columns:repeat(2,1fr)}.dc:nth-child(1){grid-column:span 2;grid-row:span 1;aspect-ratio:2/1}.sgrid,.tour-grid,.prod-grid,.usp-grid{grid-template-columns:1fr 1fr}.d-about .con{grid-template-columns:1fr}.ft{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}.form-field.full{grid-column:span 1}.checks-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.con{padding:0 20px}.sec{padding:64px 0}.pgrid,.sgrid,.dgrid,.tour-grid,.prod-grid,.cities-grid,.info-grid,.usp-grid{grid-template-columns:1fr}.dc:nth-child(1){grid-column:span 1;aspect-ratio:3/4}.hero-act{flex-direction:column;align-items:flex-start}.ft{grid-template-columns:1fr}.fbar{flex-direction:column;gap:8px;text-align:center}.d-hero{height:60vh}.nl{display:none}}
#svc-panel{transition:opacity .3s ease}
.svc-tab:hover{background:var(--g100)!important}
/* WHATSAPP FLOAT */
.wa-float{position:fixed;bottom:28px;right:28px;z-index:999;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(37,211,102,.4);transition:all .3s;font-size:28px}.wa-float:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,.5)}
.wa-float .wa-pulse{position:absolute;inset:-4px;border-radius:50%;border:2px solid #25D366;animation:wa-ring 2s infinite}
@keyframes wa-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.4);opacity:0}}
/* BACK TO TOP */
.btt{position:fixed;bottom:100px;right:28px;z-index:998;width:44px;height:44px;background:#fff;border:1px solid var(--g200);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.08);opacity:0;transform:translateY(20px);transition:all .3s;font-size:18px;color:var(--g700)}.btt.show{opacity:1;transform:translateY(0)}.btt:hover{background:var(--c1);color:#fff;border-color:var(--c1)}
/* PAGE TRANSITION */
#app{transition:opacity .3s ease}#app.fade{opacity:0}
/* SCROLL ANIM */
.anim{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}.anim.in{opacity:1;transform:translateY(0)}
/* COUNTER */
.counter{font-variant-numeric:tabular-nums}
/* DARK MODE */
body.dark{--g50:#1A1917;--g100:#2C2A26;--g200:#3a3834;--g300:#4A4844;--g500:#8A8680;--g700:#C8C5BA;--dk:#F3F2EE;background:var(--g50)}
body.dark nav{background:rgba(26,25,23,.92);border-color:rgba(255,255,255,.06)}body.dark .logo,body.dark .nl a{color:#F3F2EE}
body.dark .dd{background:rgba(40,38,34,.98);border-color:rgba(255,255,255,.08)}body.dark .dd a{color:rgba(255,255,255,.7)}body.dark .dd a:hover{background:rgba(255,255,255,.06)}
body.dark .trust{background:#222;border-color:rgba(255,255,255,.06)}
body.dark .pc,.dark .sv,.dark .prod,.dark .tour,.dark .info-card,.dark .form-box,.dark .step{background:#222;border-color:rgba(255,255,255,.08)}
body.dark .pc:hover,.dark .prod:hover,.dark .tour:hover{border-color:var(--c1);box-shadow:0 20px 60px rgba(0,0,0,.3)}
body.dark footer{background:#1A1917;border-color:rgba(255,255,255,.06)}
body.dark .form-field input,.dark .form-field select,.dark .form-field textarea{background:#2C2A26;border-color:rgba(255,255,255,.1);color:#F3F2EE}
body.dark .nav-cta{background:var(--c1);color:#fff}
.dm-toggle{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:100px;border:1px solid var(--g200);background:transparent;font-family:var(--fb);transition:all .3s}
body.dark .dm-toggle{border-color:rgba(255,255,255,.15)}
/* TRIP BUILDER */
.tb{background:linear-gradient(135deg,#1a2744,#0f1b33);border-radius:24px;padding:48px;position:relative;overflow:hidden}
.tb::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 30%,rgba(232,96,76,.1),transparent 60%)}
.tb-inner{position:relative;z-index:2}
.tb h3{font-family:var(--fd);font-size:28px;color:#fff;margin-bottom:8px}
.tb>p{color:rgba(255,255,255,.5);margin-bottom:32px}
.tb-steps{display:flex;gap:12px;margin-bottom:32px}
.tb-step{flex:1;padding:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;text-align:center;cursor:pointer;transition:all .3s}
.tb-step.active{background:rgba(232,96,76,.15);border-color:var(--c1)}
.tb-step-n{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.tb-step-t{font-size:14px;font-weight:600;color:#fff}
.tb-panel{min-height:120px}
.tb-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tb-opt{padding:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;text-align:center;transition:all .2s;color:rgba(255,255,255,.7);font-size:14px}
.tb-opt:hover,.tb-opt.sel{background:rgba(232,96,76,.15);border-color:var(--c1);color:#fff}
.tb-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.tb-input{padding:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:15px;font-family:var(--fb);outline:none;width:100%}.tb-input:focus{border-color:var(--c1)}
.tb-input::placeholder{color:rgba(255,255,255,.3)}
/* SEASONAL CALENDAR */
.cal-grid{display:grid;grid-template-columns:auto repeat(12,1fr);gap:2px;font-size:12px;margin-top:32px}
.cal-h{padding:8px 6px;text-align:center;font-weight:600;color:var(--g500)}
.cal-c{padding:8px 4px;text-align:center;font-weight:600;font-size:13px;color:var(--dk)}

var currentTZ='UTC';
function startClock(tz){currentTZ=tz;tick();}
function tick(){
var el=document.getElementById('ct');
if(!el)return;
try{
var now=new Date();
var s=now.toLocaleString('en-US',{timeZone:currentTZ,hour:'2-digit',minute:'2-digit',hour12:false});
el.textContent=s;
}catch(e){el.textContent='--:--';}
}
setInterval(tick,30000);

// SCROLL ANIMATIONS
function initAnim(){try{var els=document.querySelectorAll('.anim:not(.in)');var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');}});},{threshold:0.1});els.forEach(function(el){obs.observe(el);});}catch(e){document.querySelectorAll('.anim').forEach(function(el){el.classList.add('in');});}}

// COUNTER ANIMATION  
function animateCounters(){document.querySelectorAll('.counter').forEach(function(el){var target=parseInt(el.getAttribute('data-target'));var suffix=el.getAttribute('data-suffix')||'';var duration=1500;var startTime=null;function step(ts){if(!startTime)startTime=ts;var progress=Math.min((ts-startTime)/duration,1);el.textContent=Math.floor(progress*target)+suffix;if(progress<1)requestAnimationFrame(step);}requestAnimationFrame(step);});}

var heroIdx=0;
function heroBg(i){
heroIdx=i;
var el=document.getElementById('hero-bg');
if(!el)return;
el.style.opacity='0';
setTimeout(function(){el.style.backgroundImage="url('"+heroImages[i]+"')";el.style.opacity='1';},500);
document.querySelectorAll('.hero-dot').forEach(function(d,j){d.classList.toggle('active',j===i);});
}
setInterval(function(){
var dots=document.querySelectorAll('.hero-dot');
if(dots.length===0)return;
heroIdx=(heroIdx+1)%heroImages.length;
heroBg(heroIdx);
},5000);
